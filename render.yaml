services:
  - type: web
    name: tireinspect-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: DATABASE_URL
        fromDatabase:
          name: tireinspect-db
          property: connectionString
      - key: FRONTEND_URL
        value: "*"

databases:
  - name: tireinspect-db
    plan: free
    region: oregon
